# /etc/nginx/sites-available/taars.conf
# Symlink:  sudo ln -s /etc/nginx/sites-available/taars.conf /etc/nginx/sites-enabled/
# TLS:      sudo certbot --nginx -d taars.crevn.xyz

# --- Public API: Hono server on :8080 -----------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name taars.crevn.xyz;

    # certbot will inject the TLS block; until then this serves plain HTTP.
    # Base64 JSON mint bodies are ~4/3 the raw audio size; large uploads need room.
    # If certbot adds a separate `server { listen 443 ssl ... }` block, repeat this
    # directive there — otherwise that block may use nginx default (1m) and return 413.
    client_max_body_size 100m;
    proxy_read_timeout   300s;         # LLM streams can be slow
    proxy_send_timeout   300s;

    # CORS handled by Hono; do not double-set headers here.

    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # SSE / streaming responses
        proxy_buffering    off;
        proxy_cache        off;

        # WebSocket upgrade (harmless if unused)
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }
}

# --- OpenVoice: proxy to dev machine over Tailscale --------------------------
# Hono server reaches OpenVoice via this hostname. Backend is the dev box
# (100.82.90.55:5005) which is only reachable on the tailnet, so the EC2
# host must be joined to the same tailnet (`tailscale up`) for this to work.
#
# Note: this exposes voice traffic to the public internet (CF -> EC2 nginx
# -> tailscale -> dev box). CLAUDE.md flags voice samples as TEE-bound for
# prod; this setup is fine for dev only.
upstream openvoice_dev {
    server 100.82.90.55:5005;
    keepalive 8;
}

server {
    listen 80;
    listen [::]:80;
    server_name voice.taars.crevn.xyz;

    client_max_body_size 50m;          # voice clones can be large
    proxy_read_timeout   600s;         # synthesis can be slow on CPU
    proxy_send_timeout   600s;
    proxy_connect_timeout 10s;

    location / {
        proxy_pass         http://openvoice_dev;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        proxy_buffering    off;
        proxy_cache        off;
    }
}
